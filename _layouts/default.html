<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          'display': ['"Playfair Display"', 'Georgia', 'serif'],
          'body':    ['Lora', 'Georgia', 'serif'],
          'ui':      ['"DM Sans"', 'system-ui', 'sans-serif'],
          'mono':    ['"JetBrains Mono"', 'monospace'],
        },
        extend: {
          colors: {
            'bg':          '#070d0a',
            'bg-raised':   '#0d1810',
            'bg-code':     '#060c08',
            'parchment':   '#ede0c8',
            'sage':        '#7d9186',
            'sage-dim':    '#4a6057',
            'gold':        '#b8952a',
            'gold-light':  '#d4ab3f',
            'forest-dim':  '#1d3a28',
          },
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-parchment font-body antialiased">
  {{ content }}
</body>
</html>
